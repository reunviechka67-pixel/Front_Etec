<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center" style="color: blue;"><u><i>Form Tag</i></u></h1>
    <hr size="3" color="black">

    <form action="" style="width: 20%; height: 100%; border: 1px solid black ; padding: 20px; margin: auto; border-radius: 10px ; background-color: rgba(0, 255, 255, 0.119); ">
        <p style="text-align: center; color: blueviolet; font-size: 30px;">Learn About Form Tag</p>
        <br><br>

        <label style="font-size: 28px; color: blueviolet;" for="">Enter Email</label><br><br>
        <input style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; border-radius: 10px; width: 100%; font-size: 25px;" type="text" placeholder="Enter your Email">
        <br><br><br>

        <label style="font-size: 28px; color: blueviolet;" for="">Password</label><br><br>
        <input style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; border-radius: 10px; width: 100%; font-size: 25px;" type="text" placeholder="Password">
        <br><br><br>

        <label style="font-size: 28px; color: blueviolet;" for="">Confirm Password</label><br><br>
        <input style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; border-radius: 10px; width: 100%; font-size: 25px;" type="text" placeholder="Confirm Password">
        <br><br>

        <button align="center" style="width: 100%; font-size: 30px; border-radius: 10px;">Sign Up</button>
    </form>
</body>
</html>
